<html translate="no">

<head>
    <title>Acceda a su estudio | NUBIX</title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta http-equiv="Content-Language" content="es-mx">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="author" content="Theia SAPI de CV">
    <link rel="shortcut icon" href="assets/images/favicon_1.ico">
    <meta name="description" content="De clic aquí">
    <meta property="og:image" content="https://static.nubix.cloud/og_image.jpg">
    <meta property="og:site_name" content="nubix.cloud">
    <meta property="og:description" content="De clic aquí">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/images/favicon_1.ico" type="image/x-icon">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <link href="stylesheets/loading_bar.css" rel="stylesheet" type="text/css">
    <script src="javascripts/translate.js?v=4.8.0+0"></script>
    <style>
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .container__left {
            width: 33%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Enable absolute positioning for overlay */
        }

        .resizer {
            background-color: #cbd5e0;
            cursor: ew-resize;
            height: 100%;
            width: 3px;
        }

        .container__right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            min-height: 100%;
            min-width: 100%;
            background-color: #252525;
        }

        body {
            margin: 0;
        }

        /* Overlay positioned on the right side of the report, centered vertically */
        .report-overlay {
            position: absolute;
            top: 50%;
            right: -40px;
            /* Adjust horizontal offset as needed */
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .report-overlay button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 32px;
            text-align: center;
            padding: 0;
        }

        /* Specific style for the close button to make it red */
        #close-btn {
            background-color: red;
            color: white;
        }

        .report-overlay button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="container">
<div id="report-panel">Cargando...</div>
            <div class="report-overlay"><button id="close-btn" type="button">×</button><button id="fullscreen-btn"
                    type="button">⛶</button></div>

        </div>
        <div class="resizer" id="dragMe"></div>
        <div class="container__right right"><iframe id="viewer" name="viewer" src="about:blank" frameborder="0" style="min-height: 100%; min-width: 100%; background-color: #252525;"></iframe></div>

    </div>
<script src="javascripts/drive-utils.js"></script>
    <script src="config/default.js"></script>


    <script>
      // Dynamic OHIF init
      async function initViewer(fileId) {
        if (!fileId) return;
        const studyData = await driveUtils.fetchStudy(fileId);
        document.getElementById('viewer').src = driveUtils.generateOHIFUrl(fileId);
        updateReportPanel(studyData, fileId);
      }

      function updateReportPanel(studyData, fileId) {
        const patient = studyData.studies[0];
        const manifest = driveUtils.generateManifest({studies: [patient]});
        document.getElementById('report-panel').innerHTML = `
          <h2>${patient.PatientName}</h2>
          <p>ID: ${patient.PatientID}</p>
          <p>Manifest: <pre>${JSON.stringify(manifest, null, 2)}</pre></p>
          <button onclick="driveUtils.copyShareLink('${fileId}', '${patient.PatientName}')">Copiar Link Compartir</button>
        `;
      }
      // On load
      window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        if (fileId) {
          initViewer(fileId);
        } else {
          document.getElementById('viewer').src = 'https://viewer.ohif.org/viewer';
        }

      });

    </script>
    <script src="javascripts/split.js"></script>
    <script src="javascripts/dist/split-reporte.min.js"></script>
</body>


</html>
