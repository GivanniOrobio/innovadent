    <style>
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .container__left {
            width: 33%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Enable absolute positioning for overlay */
        }

        .resizer {
            background-color: #cbd5e0;
            cursor: ew-resize;
            height: 100%;
            width: 3px;
        }

        .container__right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            min-height: 100%;
            min-width: 100%;
            background-color: #252525;
        }

        body {
            margin: 0;
        }

        /* Overlay positioned on the right side of the report, centered vertically */
        .report-overlay {
            position: absolute;
            top: 50%;
            right: -40px;
            /* Adjust horizontal offset as needed */
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .report-overlay button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 32px;
            text-align: center;
            padding: 0;
        }

        /* Specific style for the close button to make it red */
        #close-btn {
            background-color: red;
            color: white;
        }

        .report-overlay button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="container">

                frameborder="0"></iframe>

                    type="button">⛶</button></div>
        </div>
        <div class="resizer" id="dragMe"></div>
        <div class="container__right right"><iframe id="viewer" name="viewer"
                src="https://ver.nubix.cloud/viewer?url=https%3A%2F%2Fapp.nubix.cloud%2Fapi%2Fv1%2Forganization%2Fstudy%2F682168%2Ffiles%2Fohif%3Forganization%3Dauth0%7C683000ca8c1980731dc52d21%26access_code%3D8AHGnsM6busWMRPmaL03OhXI6kfX_Bxw1jUC7bwRUx%26pin%3Dnull"
