<!DOCTYPE html>
<html>
<head>
  <title>Seleccionar Estudio - NUBIX</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; max-width: 1000px; margin: 50px auto; padding: 20px; }
    h1 { text-align: center; }
    input, button { padding: 10px; margin: 10px 0; box-sizing: border-box; }
    input { width: 70%; }
    button { width: 25%; cursor: pointer; }
    .loading { text-align: center; padding: 20px; }
    .error { color: red; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #36404A; color: white; }
    tr:hover { background-color: #f0f8ff; }
    .btn-cargar, .btn-compartir { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 5px; }
    .btn-cargar { background-color: #36404A; color: white; }
    .btn-cargar:hover { background-color: #2c353f; }
    .btn-compartir { background-color: #4CAF50; color: white; }
    .btn-compartir:hover { background-color: #45a049; }
    .zip-file { background-color: #fff3cd; }
  </style>
</head>
<body>
  <h1>Estudios DICOM - Google Drive</h1>
  <div style="text-align: center;">
    <input id="search" placeholder="Buscar por nombre..." type="text">
    <button onclick="loadStudies()">Actualizar lista</button>
  </div>
  <div id="list" class="loading">Presione "Actualizar lista" para cargar los archivos</div>
  <div id="error"></div>
  <script src="javascripts/drive-utils.js"></script>
  <script>
    let studies = [];

    window.loadStudies = function() {
      showLoading();
      fetch(`${API_BASE}/list-drive`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          studies = data.files || [];
          renderTable();
        })
        .catch(err => showError('Error cargando estudios: ' + err.message));
    }

    window.isZip = function(file) {
      return file.mimeType && file.mimeType.includes('zip');
    }

    window.renderTable = function() {
      const search = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('list');

      const filtered = studies.filter(s => s.name.toLowerCase().includes(search));

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center;">No se encontraron archivos</p>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Tipo</th>
              <th>ID</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
      `;

      filtered.forEach(file => {
        const isZipFile = isZip(file);
        const rowClass = isZipFile ? 'zip-file' : '';
        const cargarBtn = isZipFile
          ? `<button class="btn-cargar" onclick="cargarEstudio('${file.id}')">Cargar</button>`
          : `<span style="color:#999;">No compatible</span>`;

        html += `
          <tr class="${rowClass}">
            <td><strong>${file.name}</strong></td>
            <td>${file.mimeType || 'N/A'}</td>
            <td style="font-family:monospace;font-size:12px;">${file.id}</td>
            <td>
              ${cargarBtn}
              <button class="btn-compartir" onclick="compartirLink('${file.id}', '${file.name}')">Compartir link</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    window.cargarEstudio = function(id) {
      window.location.href = `viewer.html?fileId=${id}`;
    }

    window.compartirLink = function(id, name) {
      const link = `${window.location.origin}${window.location.pathname.replace('index.html', 'viewer.html')}?fileId=${id}`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(link).then(() => {
          alert(`Link copiado al portapapeles:\n${link}`);
        }).catch(() => {
          prompt('Copie el siguiente link:', link);
        });
      } else {
        prompt('Copie el siguiente link:', link);
      }
    }

    window.showLoading = function() {
      document.getElementById('list').innerHTML = '<div class="loading">Cargando archivos...</div>';
    }

    window.showError = function(msg) {
      document.getElementById('error').innerHTML = `<div class="error">${msg}</div>`;
    }

    document.getElementById('search').addEventListener('input', renderTable);

    // Cargar estudios al iniciar
    loadStudies();
  </script>
</body>
</html>
