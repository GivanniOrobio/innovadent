<html translate="no">

<head>
    <title>Visor DICOM | NUBIX</title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta http-equiv="Content-Language" content="es-mx">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="author" content="Theia SAPI de CV">
    <link rel="shortcut icon" href="assets/images/favicon_1.ico">
    <meta name="description" content="Visor de estudios DICOM">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/images/favicon_1.ico" type="image/x-icon">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <link href="stylesheets/loading_bar.css" rel="stylesheet" type="text/css">
    <script src="javascripts/translate.js?v=4.8.0+0"></script>
    <style>
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .container__left {
            width: 33%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #f5f5f5;
        }

        .resizer {
            background-color: #cbd5e0;
            cursor: ew-resize;
            height: 100%;
            width: 3px;
        }

        .container__right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            min-height: 100%;
            min-width: 100%;
            background-color: #252525;
        }

        body {
            margin: 0;
        }

        .study-info {
            padding: 20px;
            font-family: Arial, sans-serif;
            max-width: 400px;
        }

        .study-info h2 {
            color: #36404A;
            border-bottom: 2px solid #36404A;
            padding-bottom: 10px;
        }

        .study-info .info-row {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        .study-info .label {
            font-weight: bold;
            color: #555;
        }

        .study-info .value {
            color: #333;
        }

        .report-overlay {
            position: absolute;
            top: 50%;
            right: -40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .report-overlay button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 32px;
            text-align: center;
            padding: 0;
        }

        #close-btn {
            background-color: red;
            color: white;
        }

        .report-overlay button:hover {
            background-color: #e0e0e0;
        }

        #back-btn {
            background-color: #36404A;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container__left left">
            <div id="study-info" class="study-info">
                <h2>Información del Estudio</h2>
                <div id="info-content">Cargando información...</div>
            </div>
            <div class="report-overlay">
                <button id="back-btn" type="button" onclick="window.location.href='index.html'">←</button>
                <button id="close-btn" type="button">×</button>
                <button id="fullscreen-btn" type="button">⛶</button>
            </div>
        </div>
        <div class="resizer" id="dragMe"></div>
        <div class="container__right right"><iframe id="viewer" name="viewer" frameborder="0"></iframe></div>
    </div>
    <script src="javascripts/split.js"></script>
    <script>
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileId = urlParams.get('fileId');
            
            const defaultViewerUrl = 'about:blank';
            
            if (fileId) {
                // Cargar información del estudio desde el backend
                fetch(`${API_BASE}/study/${fileId}`)
                    .then(res => res.json())
                    .then(data => {
                        console.log('[viewer.html] Estudio cargado:', data);
                        displayStudyInfo(data);
                    })
                    .catch(err => {
                        console.error('[viewer.html] Error cargando estudio:', err);
                        document.getElementById('info-content').innerHTML = 
                            '<p style="color:red;">Error cargando información del estudio</p>';
                    });
                
                // Cargar viewer OHIF local con el estudio desde el backend
                const viewerUrl = `view/index.html?fileId=${fileId}`;
                document.getElementById('viewer').src = viewerUrl;
                
                console.log(`[viewer.html] Cargando estudio: ${fileId}`);
                console.log(`[viewer.html] Viewer URL: ${viewerUrl}`);
                
                // Generar manifest.json dinámico
                const manifest = {
                    name: `Estudio ${fileId}`,
                    short_name: fileId,
                    start_url: `./viewer.html?fileId=${fileId}`,
                    display: 'standalone',
                    background_color: '#36404A',
                    description: `Estudio DICOM ${fileId}`,
                    icons: [
                        { src: 'images/touch/homescreen48.jpg', sizes: '48x48', type: 'image/png' },
                        { src: 'images/touch/homescreen72.jpg', sizes: '72x72', type: 'image/png' },
                        { src: 'images/touch/homescreen96.jpg', sizes: '96x96', type: 'image/png' },
                        { src: 'images/touch/homescreen144.jpg', sizes: '144x144', type: 'image/png' },
                        { src: 'images/touch/homescreen168.jpg', sizes: '168x168', type: 'image/png' },
                        { src: 'images/touch/homescreen192.jpg', sizes: '192x192', type: 'image/png' }
                    ]
                };
                
                const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                const manifestUrl = URL.createObjectURL(manifestBlob);
                const manifestLink = document.querySelector('link[rel="manifest"]');
                if (manifestLink) {
                    manifestLink.href = manifestUrl;
                }
            } else {
                document.getElementById('info-content').innerHTML = '<p>No se especificó un estudio</p>';
                document.getElementById('viewer').src = defaultViewerUrl;
            }
        })();
        
        function displayStudyInfo(data) {
            const study = data.studies && data.studies[0];
            if (!study) {
                document.getElementById('info-content').innerHTML = '<p>No hay información disponible</p>';
                return;
            }
            
            const seriesCount = study.series ? study.series.length : 0;
            let instancesCount = 0;
            if (study.series) {
                study.series.forEach(s => {
                    instancesCount += s.instances ? s.instances.length : 0;
                });
            }
            
            const html = `
                <div class="info-row">
                    <span class="label">Paciente:</span>
                    <span class="value">${study.PatientName || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">ID Paciente:</span>
                    <span class="value">${study.PatientID || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Sexo:</span>
                    <span class="value">${study.PatientSex || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Fecha:</span>
                    <span class="value">${formatDate(study.StudyDate) || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Modalidad:</span>
                    <span class="value">${study.ModalitiesInStudy || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Descripción:</span>
                    <span class="value">${study.StudyDescription || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Series:</span>
                    <span class="value">${seriesCount}</span>
                </div>
                <div class="info-row">
                    <span class="label">Imágenes:</span>
                    <span class="value">${instancesCount}</span>
                </div>
                <div class="info-row">
                    <span class="label">UID:</span>
                    <span class="value" style="font-size:10px;word-break:break-all;">${study.StudyInstanceUID || 'N/A'}</span>
                </div>
            `;
            
            document.getElementById('info-content').innerHTML = html;
        }
        
        function formatDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return dateStr;
            const year = dateStr.substring(0, 4);
            const month = dateStr.substring(4, 6);
            const day = dateStr.substring(6, 8);
            return `${day}/${month}/${year}`;
        }
    </script>
</body>

</html>
