<html translate="no">

<head>
    <title>Acceda a su estudio | NUBIX</title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta http-equiv="Content-Language" content="es-mx">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="author" content="Theia SAPI de CV">
    <link rel="shortcut icon" href="assets/images/favicon_1.ico">
    <meta name="description" content="De clic aquí">
    <meta property="og:image" content="https://static.nubix.cloud/og_image.jpg">
    <meta property="og:site_name" content="nubix.cloud">
    <meta property="og:description" content="De clic aquí">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/images/favicon_1.ico" type="image/x-icon">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#36404A" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <link href="stylesheets/loading_bar.css" rel="stylesheet" type="text/css">
    <script src="javascripts/translate.js?v=4.8.0+0"></script>
    <style>
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .container__left {
            width: 33%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .resizer {
            background-color: #cbd5e0;
            cursor: ew-resize;
            height: 100%;
            width: 3px;
        }

        .container__right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            min-height: 100%;
            min-width: 100%;
            background-color: #252525;
        }

        body {
            margin: 0;
        }

        .report-overlay {
            position: absolute;
            top: 50%;
            right: -40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .report-overlay button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 32px;
            text-align: center;
            padding: 0;
        }

        #close-btn {
            background-color: red;
            color: white;
        }

        .report-overlay button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container__left left"><iframe id="report" name="report" frameborder="0"></iframe>
            <div class="report-overlay"><button id="close-btn" type="button">×</button><button id="fullscreen-btn"
                    type="button">⛶</button></div>
        </div>
        <div class="resizer" id="dragMe"></div>
        <div class="container__right right"><iframe id="viewer" name="viewer" frameborder="0"></iframe></div>
    </div>
    <script src="javascripts/split.js"></script>
    <script src="javascripts/dist/split-reporte.min.js"></script>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileId = urlParams.get('fileId');
            const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
            
            // URLs por defecto (cuando no hay fileId)
            const defaultReportUrl = 'https://app.nubix.cloud/reporte?id=682168&organization=auth0%7C683000ca8c1980731dc52d21&access_code=8AHGnsM6busWMRPmaL03OhXI6kfX_Bxw1jUC7bwRUx';
            const defaultViewerUrl = 'https://ver.nubix.cloud/viewer?url=https%3A%2F%2Fapp.nubix.cloud%2Fapi%2Fv1%2Forganization%2Fstudy%2F682168%2Ffiles%2Fohif%3Forganization%3Dauth0%7C683000ca8c1980731dc52d21%26access_code%3D8AHGnsM6busWMRPmaL03OhXI6kfX_Bxw1jUC7bwRUx%26pin%3Dnull';
            
            if (fileId) {
                // Cargar reporte con el fileId seleccionado
                const reportUrl = `https://app.nubix.cloud/reporte?id=${fileId}&organization=auth0%7C683000ca8c1980731dc52d21&access_code=8AHGnsM6busWMRPmaL03OhXI6kfX_Bxw1jUC7bwRUx`;
                document.getElementById('report').src = reportUrl;
                
                // Cargar viewer con el estudio desde el backend
                const viewerUrl = `https://ver.nubix.cloud/viewer?url=${encodeURIComponent(`${API_BASE}/study/${fileId}`)}`;
                document.getElementById('viewer').src = viewerUrl;
                
                console.log(`[viewer.html] Cargando estudio: ${fileId}`);
                console.log(`[viewer.html] Report URL: ${reportUrl}`);
                console.log(`[viewer.html] Viewer URL: ${viewerUrl}`);
                
                // Generar manifest.json dinámico
                const manifest = {
                    name: `Estudio ${fileId}`,
                    short_name: fileId,
                    start_url: `./viewer.html?fileId=${fileId}`,
                    display: 'standalone',
                    background_color: '#36404A',
                    description: `Estudio DICOM ${fileId}`,
                    icons: [
                        { src: 'images/touch/homescreen48.jpg', sizes: '48x48', type: 'image/png' },
                        { src: 'images/touch/homescreen72.jpg', sizes: '72x72', type: 'image/png' },
                        { src: 'images/touch/homescreen96.jpg', sizes: '96x96', type: 'image/png' },
                        { src: 'images/touch/homescreen144.jpg', sizes: '144x144', type: 'image/png' },
                        { src: 'images/touch/homescreen168.jpg', sizes: '168x168', type: 'image/png' },
                        { src: 'images/touch/homescreen192.jpg', sizes: '192x192', type: 'image/png' }
                    ]
                };
                
                // Actualizar el link del manifest
                const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                const manifestUrl = URL.createObjectURL(manifestBlob);
                const manifestLink = document.querySelector('link[rel="manifest"]');
                if (manifestLink) {
                    manifestLink.href = manifestUrl;
                }
            } else {
                document.getElementById('report').src = defaultReportUrl;
                document.getElementById('viewer').src = defaultViewerUrl;
            }
        })();
    </script>
</body>

</html>
