<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Visor DICOM - NUBIX</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="./image/nubix.png" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #root {
            height: 100%;
            width: 100%;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #252525;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 9999;
        }
        .loading.hidden {
            display: none;
        }
        .loading h2 {
            margin-bottom: 10px;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #5fbcaa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="loading" class="loading">
        <div>
            <h2>Cargando visor DICOM...</h2>
            <p id="loading-info">Iniciando...</p>
            <div class="spinner"></div>
            <p id="error-msg" class="error-msg" style="display:none;"></p>
        </div>
    </div>

    <!-- OHIF Viewer v3 desde CDN -->
    <script src="https://unpkg.com/@ohif/viewer@3.9.0/dist/ohif-viewer.umd.js"></script>
    
    <script>
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        
        const loadingInfo = document.getElementById('loading-info');
        const errorMsg = document.getElementById('error-msg');
        
        loadingInfo.textContent = fileId 
            ? `Cargando estudio: ${fileId}` 
            : 'Esperando parámetro fileId...';
        
        // Manejar errores de carga del script
        window.addEventListener('error', (e) => {
            if (e.target && e.target.src && e.target.src.includes('ohif-viewer')) {
                errorMsg.textContent = 'Error cargando el visor OHIF. Verifica tu conexión a internet.';
                errorMsg.style.display = 'block';
                console.error('Error loading OHIF Viewer:', e);
            }
        });
        
        if (fileId) {
            const studyUrl = `${API_BASE}/study/${fileId}`;
            
            // Configurar OHIF Viewer v3
            window.config = {
                routerBasename: '/view/',
                showStudyList: false,
                disableConfirmationPrompts: true,
                showPatientInfo: false,
                activateViewportBeforeInteraction: false,
                extensions: [],
                modes: [
                    {
                        name: 'basic-test-mode',
                        routes: [
                            {
                                path: '/viewer',
                                exact: true,
                                main: '@ohif/extension-default'.routes.viewer
                            }
                        ]
                    }
                ],
                dataSources: [
                    {
                        namespace: '@ohif/extension-default.dataSourcesModule.dicomjson',
                        sourceName: 'dicomjson',
                        configuration: {
                            friendlyName: `DICOM JSON - Estudio ${fileId}`,
                            name: 'dicomjson',
                            url: studyUrl,
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        }
                    }
                ],
                httpErrorHandler: (error) => {
                    console.warn('[HTTP Error]', error.status, error.message);
                }
            };
            
            console.log('[OHIF Config] Initializing viewer with study:', fileId);
            console.log('[OHIF Config] API URL:', studyUrl);
            
            // Inicializar OHIF cuando el script cargue
            window.addEventListener('load', () => {
                if (window.OHIFViewer) {
                    console.log('[OHIF] Viewer loaded, initializing...');
                    setTimeout(() => {
                        document.getElementById('loading').classList.add('hidden');
                    }, 2000);
                }
            });
        } else {
            loadingInfo.textContent = 'Error: No se especificó fileId en la URL';
        }
    </script>
</body>
</html>
