<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Visor DICOM - NUBIX</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="./image/nubix.png" type="image/png">
    
    <!-- OHIF Viewer CSS -->
    <link href="./css/app.bundle.css" rel="stylesheet" type="text/css">
    <link href="./css/963.css" rel="stylesheet" type="text/css">
    <link href="./css/5674.css" rel="stylesheet" type="text/css">
    <link href="./css/6201.css" rel="stylesheet" type="text/css">
    <link href="./css/7197.css" rel="stylesheet" type="text/css">
    <link href="./css/8402.css" rel="stylesheet" type="text/css">
    <link href="./css/9026.css" rel="stylesheet" type="text/css">
    <link href="./css/2308.css" rel="stylesheet" type="text/css">
    <link href="./css/4759.css" rel="stylesheet" type="text/css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        #root { height: 100%; width: 100%; }
        .loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background-color: #252525; color: white; font-family: Arial, sans-serif; z-index: 9999;
        }
        .loading.hidden { display: none; }
        .spinner {
            border: 4px solid #333; border-top: 4px solid #5fbcaa;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="loading" class="loading">
        <div>
            <h2>Cargando visor DICOM...</h2>
            <p id="loading-info">Iniciando...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Configurar webpack public path para cargar chunks desde directorio actual -->
    <script>
        // IMPORTANTE: Configurar rutas relativas antes de cargar cualquier bundle
        window.__webpack_public_path__ = './';
        
        // Configurar OHIF
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        
        if (fileId) {
            window.config = {
                routerBasename: '/view',
                showStudyList: false,
                showLoadingIndicator: true,
                disableConfirmationPrompts: true,
                showPatientInfo: false,
                activateViewportBeforeInteraction: false,
                useSharedArrayBuffer: false,
                extensions: [],
                modes: [],
                customizationService: {},
                maxNumberOfWebWorkers: 3,
                showWarningMessageForCrossOrigin: false,
                defaultDataSourceName: 'dicomjson',
                dataSources: [{
                    namespace: '@ohif/extension-default.dataSourcesModule.dicomjson',
                    sourceName: 'dicomjson',
                    configuration: {
                        friendlyName: 'DICOM JSON - Google Drive',
                        name: 'dicomjson',
                        url: `${API_BASE}/study/${fileId}`,
                        headers: { 'Content-Type': 'application/json' }
                    }
                }],
                httpErrorHandler: (error) => console.warn('[HTTP Error]', error.status, error.message),
                whiteLabeling: {
                    createLogoComponentFn: function (React) {
                        return React.createElement("a", {
                            target: "_self", rel: "noopener noreferrer",
                            className: "pointer-events-none", href: "#",
                        }, React.createElement("img", {
                            src: "./image/nubix.png",
                            className: "w-8 h-8 object-contain", alt: "Logo"
                        }));
                    }
                },
                hotkeys: [
                    { commandName: "windowLevel", label: "W/L", keys: ["w"] },
                    { commandName: "zoom", label: "Zoom", keys: ["z"] },
                    { commandName: "pan", label: "Pan", keys: ["p"] },
                    { commandName: "resetViewport", label: "Reset", keys: ["space"] }
                ]
            };
            console.log('[OHIF] Study URL:', `${API_BASE}/study/${fileId}`);
        } else {
            document.getElementById('loading-info').textContent = 'Error: No se especificó fileId';
        }
    </script>
    
    <!-- OHIF Viewer Bundle -->
    <script src="./javascript/app.bundle.a7e524c0e2cef2b01e35.js"></script>
    
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 2000);
        });
    </script>
</body>
</html>
