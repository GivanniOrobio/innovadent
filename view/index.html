<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Visor DICOM - NUBIX</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="./image/nubix.png" type="image/png">
    
    <!-- Cornerstone.js -->
    <script src="https://unpkg.com/hammerjs@2.0.8/hammer.js"></script>
    <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.min.js"></script>
    <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script>
    <script src="https://unpkg.com/cornerstone-math@0.1.9/dist/cornerstoneMath.js"></script>
    <script src="https://unpkg.com/cornerstone-tools@4.20.1/dist/cornerstoneTools.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .series-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px;
            background: #1a1a1a;
        }
        .viewport {
            position: relative;
            background: #000;
            min-width: 200px;
            min-height: 200px;
            flex: 1 1 300px;
            max-width: 100%;
            max-height: 50%;
        }
        .viewport-element {
            width: 100%;
            height: 100%;
        }
        .viewport-label {
            position: absolute;
            top: 8px;
            left: 8px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #252525;
            color: white;
            z-index: 9999;
        }
        .loading.hidden {
            display: none;
        }
        .loading h2 {
            margin-bottom: 10px;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #5fbcaa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
            max-width: 80%;
            text-align: center;
            padding: 0 20px;
        }
        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 16px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }
        .tools-help {
            color: #aaa;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <h2>Cargando visor DICOM...</h2>
        <p id="loading-info">Iniciando...</p>
        <div class="spinner"></div>
        <p id="error-msg" class="error-msg" style="display:none;"></p>
    </div>
    
    <div class="container">
        <div id="series-container" class="series-container"></div>
    </div>
    
    <div class="info-bar" style="display:none;" id="info-bar">
        <span id="patient-info"></span>
        <span class="tools-help">🖱️ Click+Drag: W/L | Right-click: Pan | Wheel: Zoom</span>
    </div>

    <script>
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        
        const loadingInfo = document.getElementById('loading-info');
        const errorMsg = document.getElementById('error-msg');
        const loadingEl = document.getElementById('loading');
        const infoBar = document.getElementById('info-bar');
        
        let studyData = null;
        let viewports = [];
        
        // Loader personalizado para DICOM desde HTTPS
        function createImageLoader() {
            cornerstone.registerImageLoader('wadouri', loadImage);
            cornerstone.registerImageLoader('wadouri', loadImage);
        }
        
        async function loadImage(imageId) {
            const url = imageId.replace('wadouri:', '');
            console.log('[Loader] Cargando DICOM:', url);
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/dicom',
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const byteArray = new Uint8Array(arrayBuffer);
                
                console.log('[Loader] DICOM cargado:', byteArray.length, 'bytes');
                
                // Crear imagen cornerstone
                const image = cornerstoneWADOImageLoader.wadouri.loadImage(imageId, {
                    byteArray: byteArray,
                    url: url
                }).promise;
                
                return image;
            } catch (err) {
                console.error('[Loader] Error:', err);
                throw err;
            }
        }
        
        async function loadStudy() {
            try {
                loadingInfo.textContent = `Obteniendo estudio: ${fileId}`;
                
                // Cargar wado-image-loader dinámicamente
                await loadScript('https://unpkg.com/cornerstone-wado-image-loader@3.4.0/dist/cornerstoneWADOImageLoader.bundle.min.js');
                
                // Configurar loader
                cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
                cornerstoneWADOImageLoader.external.dicomParser = dicomParser;
                
                cornerstoneWADOImageLoader.configure({
                    useWebWorkers: false,
                    httpOptions: {
                        headers: {
                            'Accept': 'application/dicom',
                        }
                    }
                });
                
                // Registrar loader personalizado
                cornerstone.registerImageLoader('wadouri', wadoImageLoader);
                
                const response = await fetch(`${API_BASE}/study/${fileId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                studyData = await response.json();
                console.log('[DICOM] Estudio cargado:', studyData);
                
                if (!studyData.studies || studyData.studies.length === 0) {
                    throw new Error('No se encontraron estudios');
                }
                
                const study = studyData.studies[0];
                document.getElementById('patient-info').textContent = 
                    `${study.PatientName || 'N/A'} | ID: ${study.PatientID || ''}`;
                infoBar.style.display = 'flex';
                
                const container = document.getElementById('series-container');
                container.innerHTML = '';
                
                let loaded = 0;
                const total = study.series ? study.series.length : 0;
                
                for (const series of (study.series || [])) {
                    const viewportDiv = document.createElement('div');
                    viewportDiv.className = 'viewport';
                    viewportDiv.innerHTML = `
                        <div class="viewport-label">
                            Serie ${series.SeriesNumber || ''} | ${series.Modality || ''}
                        </div>
                        <div class="viewport-element"></div>
                    `;
                    container.appendChild(viewportDiv);
                    
                    if (series.instances && series.instances.length > 0) {
                        let imageUrl = series.instances[0].wadoUri || series.instances[0].wadoUrl;
                        if (imageUrl && !imageUrl.startsWith('wadouri:')) {
                            imageUrl = 'wadouri:' + imageUrl;
                        }
                        
                        loadViewport(viewportDiv.querySelector('.viewport-element'), imageUrl, () => {
                            loaded++;
                            if (loaded >= total) {
                                setTimeout(() => loadingEl.classList.add('hidden'), 500);
                            }
                        });
                    }
                }
                
                if (total === 0) loadingEl.classList.add('hidden');
                
            } catch (err) {
                console.error('[DICOM] Error:', err);
                errorMsg.textContent = `Error: ${err.message}`;
                errorMsg.style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
            }
        }
        
        function wadoImageLoader(imageId) {
            const url = imageId.replace('wadouri:', '');
            return cornerstoneWADOImageLoader.loadImage(imageId);
        }
        
        async function loadViewport(element, imageUrl, onComplete) {
            try {
                cornerstone.enable(element);
                console.log('[Viewport] Cargando:', imageUrl);
                
                const image = await cornerstone.loadAndCacheImage(imageUrl);
                console.log('[Viewport] Imagen cargada:', image);
                
                cornerstone.displayImage(element, image);
                
                cornerstoneTools.external.cornerstone = cornerstone;
                cornerstoneTools.external.Hammer = Hammer;
                cornerstoneTools.init();
                
                cornerstoneTools.addTool(cornerstoneTools.WwwcTool);
                cornerstoneTools.addTool(cornerstoneTools.PanTool);
                cornerstoneTools.addTool(cornerstoneTools.ZoomTool);
                
                cornerstoneTools.setToolActive('Wwwc', { mouseButton: 1 });
                cornerstoneTools.setToolActive('Pan', { mouseButton: 2 });
                cornerstoneTools.setToolActive('Zoom', { mouseButton: 1, shiftKey: true });
                
                viewports.push({ element });
                if (onComplete) onComplete();
                
            } catch (err) {
                console.error('[Viewport] Error:', err);
                element.innerHTML += `<div style="color:#ff6b6b;padding:10px;font-size:12px;">${err.message}</div>`;
                if (onComplete) onComplete();
            }
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Failed to load ${src}`));
                document.head.appendChild(script);
            });
        }
        
        if (fileId) {
            loadStudy();
        } else {
            loadingInfo.textContent = 'Error: No se especificó fileId';
            document.querySelector('.spinner').style.display = 'none';
        }
        
        window.addEventListener('resize', () => {
            viewports.forEach(vp => cornerstone.resize(vp.element));
        });
    </script>
</body>
</html>
