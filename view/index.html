<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Visor DICOM - NUBIX</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="./image/nubix.png" type="image/png">
    <link href="./css/app.bundle.css" rel="stylesheet" type="text/css">
    <link href="./css/963.css" rel="stylesheet" type="text/css">
    <link href="./css/5674.css" rel="stylesheet" type="text/css">
    <link href="./css/6201.css" rel="stylesheet" type="text/css">
    <link href="./css/7197.css" rel="stylesheet" type="text/css">
    <link href="./css/8402.css" rel="stylesheet" type="text/css">
    <link href="./css/9026.css" rel="stylesheet" type="text/css">
    <link href="./css/2308.css" rel="stylesheet" type="text/css">
    <link href="./css/4759.css" rel="stylesheet" type="text/css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #root {
            height: 100%;
            width: 100%;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #252525;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 9999;
        }
        .loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="loading" class="loading">
        <div>
            <h2>Cargando visor DICOM...</h2>
            <p id="loading-info">Iniciando...</p>
        </div>
    </div>

    <script>
        // Configurar OHIF antes de que cargue el bundle
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        
        if (fileId) {
            window.config = {
                name: "config/default.js",
                routerBasename: "/view/",
                showStudyList: false,
                showLoadingIndicator: true,
                disableConfirmationPrompts: true,
                showPatientInfo: "disabled",
                activateViewportBeforeInteraction: false,
                useSharedArrayBuffer: "AUTO",
                extensions: [],
                modes: [],
                customizationService: {},
                showStudyList: false,
                maxNumberOfWebWorkers: 3,
                showWarningMessageForCrossOrigin: false,
                showCPUFallbackMessage: false,
                experimentalStudyBrowserSort: false,
                strictZSpacingForVolumeViewport: true,
                groupEnabledModesFirst: true,
                allowMultiSelectExport: true,
                maxNumRequests: { interaction: 100, thumbnail: 1, prefetch: 17 },
                studyPrefetcher: {
                    enabled: true,
                    displaySetsCount: 2,
                    maxNumPrefetchRequests: 5,
                    order: "closest"
                },
                defaultDataSourceName: "dicomjson",
                dataSources: [
                    {
                        namespace: "@ohif/extension-default.dataSourcesModule.dicomjson",
                        sourceName: "dicomjson",
                        configuration: {
                            friendlyName: `DICOM JSON - Estudio ${fileId}`,
                            name: "dicomjson",
                            url: `${API_BASE}/study/${fileId}`,
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        }
                    }
                ],
                httpErrorHandler: (error) => {
                    console.warn('[HTTP Error]', error.status, error.message);
                },
                whiteLabeling: {
                    createLogoComponentFn: function (React) {
                      return React.createElement(
                        "a",
                        {
                          target: "_self",
                          rel: "noopener noreferrer",
                          className: "pointer-events-none",
                          href: "#",
                        },
                        React.createElement("img", {
                          src: "./image/nubix.png",
                          className: "w-8 h-8 object-contain",
                          alt: "Logo",
                        }),
                      );
                    },
                },
                hotkeys: [
                    { commandName: "incrementActiveViewport", label: "Next Viewport", keys: ["right"] },
                    { commandName: "decrementActiveViewport", label: "Previous Viewport", keys: ["left"] },
                    { commandName: "rotateViewportCW", label: "Rotate Right", keys: ["r"] },
                    { commandName: "rotateViewportCCW", label: "Rotate Left", keys: ["l"] },
                    { commandName: "invertViewport", label: "Invert", keys: ["i"] },
                    { commandName: "flipViewportHorizontal", label: "Flip Horizontally", keys: ["h"] },
                    { commandName: "flipViewportVertical", label: "Flip Vertically", keys: ["v"] },
                    { commandName: "scaleUpViewport", label: "Zoom In", keys: ["+"] },
                    { commandName: "scaleDownViewport", label: "Zoom Out", keys: ["-"] },
                    { commandName: "fitViewportToWindow", label: "Zoom to Fit", keys: ["="] },
                    { commandName: "resetViewport", label: "Reset", keys: ["space"] },
                    { commandName: "nextImage", label: "Next Image", keys: ["down"] },
                    { commandName: "previousImage", label: "Previous Image", keys: ["up"] },
                    { commandName: "previousViewportDisplaySet", label: "Previous Series", keys: ["pagedown"] },
                    { commandName: "nextViewportDisplaySet", label: "Next Series", keys: ["pageup"] },
                    { commandName: "setToolActive", commandOptions: { toolName: "Zoom" }, label: "Zoom", keys: ["z"] },
                    { commandName: "windowLevelPreset1", label: "W/L Preset 1", keys: ["1"] },
                    { commandName: "windowLevelPreset2", label: "W/L Preset 2", keys: ["2"] },
                    { commandName: "windowLevelPreset3", label: "W/L Preset 3", keys: ["3"] },
                    { commandName: "windowLevelPreset4", label: "W/L Preset 4", keys: ["4"] },
                    { commandName: "windowLevelPreset5", label: "W/L Preset 5", keys: ["5"] },
                    { commandName: "windowLevelPreset6", label: "W/L Preset 6", keys: ["6"] },
                    { commandName: "windowLevelPreset7", label: "W/L Preset 7", keys: ["7"] },
                    { commandName: "windowLevelPreset8", label: "W/L Preset 8", keys: ["8"] },
                    { commandName: "windowLevelPreset9", label: "W/L Preset 9", keys: ["9"] }
                ]
            };
            
            document.getElementById('loading-info').textContent = `Cargando estudio: ${fileId}`;
            console.log('[OHIF Config] Initializing viewer with study:', fileId);
            console.log('[OHIF Config] API URL:', `${API_BASE}/study/${fileId}`);
        } else {
            document.getElementById('loading-info').textContent = 'Error: No se especificó fileId en la URL';
        }
    </script>
    
    <script src="./javascript/app.bundle.a7e524c0e2cef2b01e35.js"></script>
    
    <script>
        // Ocultar loading cuando OHIF cargue
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
