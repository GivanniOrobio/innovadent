<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Visor DICOM - NUBIX</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="./image/nubix.png" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #252525;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 9999;
        }
        .loading.hidden {
            display: none;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #5fbcaa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <iframe id="viewer" src="about:blank" title="OHIF Viewer"></iframe>
    <div id="loading" class="loading">
        <div>
            <h2>Cargando visor DICOM...</h2>
            <p id="loading-info">Iniciando...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://dcom-view-server.onrender.com/api/drive';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');
        
        const loadingInfo = document.getElementById('loading-info');
        const viewerFrame = document.getElementById('viewer');
        
        if (fileId) {
            const studyUrl = `${API_BASE}/study/${fileId}`;
            loadingInfo.textContent = `Cargando estudio: ${fileId}`;
            
            // Usar OHIF Viewer público con nuestro backend
            // Nota: Usamos la URL codificada como parámetro
            const viewerUrl = `https://viewer.ohif.org/viewer?url=${encodeURIComponent(studyUrl)}`;
            
            console.log('[Viewer] Cargando:', viewerUrl);
            console.log('[Viewer] Study:', studyUrl);
            
            viewerFrame.src = viewerUrl;
            
            viewerFrame.onload = () => {
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 2000);
            };
            
            // Timeout por si falla la carga
            setTimeout(() => {
                if (!document.getElementById('loading').classList.contains('hidden')) {
                    loadingInfo.textContent = 'El visor está cargando...';
                }
            }, 10000);
            
        } else {
            loadingInfo.textContent = 'Error: No se especificó fileId en la URL';
            document.querySelector('.spinner').style.display = 'none';
        }
    </script>
</body>
</html>
